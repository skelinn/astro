<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>astro - video downloader</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .page-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 640px;
      padding: 2rem 1rem;
    }

    .page-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
      text-align: center;
    }

    .page-sub {
      font-size: 1rem;
      color: #888;
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .page-tagline {
      color: #a3a3a3;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .search-form {
      width: 100%;
      position: relative;
    }

    .search-form input {
      width: 100%;
      height: 56px;
      background: rgba(255,255,255,0.06);
      border: 2px solid #333;
      border-radius: 9999px;
      color: #fff;
      font-size: 1rem;
      padding: 0 130px 0 24px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-form input:focus {
      border-color: #fff;
    }

    .search-form input::placeholder {
      color: #555;
    }

    .search-form button {
      position: absolute;
      top: 4px;
      right: 4px;
      height: 48px;
      padding: 0 1.5rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.2s;
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }

    .search-form button:hover { opacity: 0.85; }

    .status {
      margin-top: 1.5rem;
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      min-height: 24px;
    }

    .status.error { color: #ff4444; }

    .spinner {
      display: none;
      margin-top: 1.5rem;
    }

    .spinner .dot {
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      display: inline-block;
      margin: 0 4px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .spinner .dot:nth-child(1) { animation-delay: -0.32s; }
    .spinner .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .result-card {
      margin-top: 1.5rem;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid #222;
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }

    .result-card .thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .result-card .info {
      padding: 1rem 1.25rem;
    }

    .result-card .info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .result-card .info .author {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
    }

    .formats {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .format-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .format-row:last-child { border-bottom: none; }

    .format-row .label {
      font-size: 0.9rem;
      color: #ccc;
    }

    .format-row .dl-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 9999px;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .format-row .dl-btn:hover { opacity: 0.85; }

    .how-to {
      width: 100%;
      margin-top: 3rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid #222;
      border-radius: 16px;
    }

    .how-to h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .how-to ol {
      padding-left: 1.25rem;
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .credit {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #fff;
      opacity: 0.4;
      z-index: 10;
      user-select: none;
    }

    @media (max-width: 480px) {
      .page-title { font-size: 1.6rem; }
      .search-form input { padding-right: 90px; }
      .search-form button { padding: 0 1rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="page-content">
    <div class="page-title">アストロ</div>
    <div class="page-sub">video downloader</div>
    <p class="page-tagline">paste a youtube link to download.</p>

    <div class="search-form" id="searchForm">
      <input type="text" id="urlInput" placeholder="Paste YouTube URL here..." autocomplete="off" autofocus>
      <button type="button" id="goBtn">
        <i class="fa-solid fa-arrow-right"></i> Go
      </button>
    </div>

    <div class="spinner" id="spinner">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="status" id="status"></div>

    <div class="result-card" id="resultCard">
      <img class="thumb" id="resultThumb" src="" alt="">
      <div class="info">
        <h3 id="resultTitle"></h3>
        <div class="author" id="resultAuthor"></div>
        <div class="formats" id="formats"></div>
      </div>
    </div>

    <div class="how-to">
      <h2>How to use</h2>
      <ol>
        <li>Paste a YouTube video link in the box above</li>
        <li>Click "Go" or press Enter</li>
        <li>Choose your preferred format and quality</li>
        <li>Click "Download" to save the file</li>
      </ol>
    </div>
  </div>

  <div class="credit">made by skelin</div>

<script>
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  const stars = Array.from({length: 200}, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
    o: Math.random() * 0.8 + 0.2
  }));

  function animate() {
    ctx.clearRect(0, 0, w, h);
    stars.forEach(s => {
      s.x += s.vx;
      s.y += s.vy;
      if (s.x < 0 || s.x > w) s.vx *= -1;
      if (s.y < 0 || s.y > h) s.vy *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.o + Math.sin(Date.now() / 1000 + s.x) * 0.1})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  });

  animate();
})();
</script>

<script>
const urlInput = document.getElementById('urlInput');
const goBtn = document.getElementById('goBtn');
const spinner = document.getElementById('spinner');
const statusEl = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const resultThumb = document.getElementById('resultThumb');
const resultTitle = document.getElementById('resultTitle');
const resultAuthor = document.getElementById('resultAuthor');
const formatsDiv = document.getElementById('formats');

function extractVideoId(url) {
  const patterns = [
    /(?:youtube\.com\/(?:watch\?.*v=|embed\/|v\/|shorts\/))([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}

function showStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'status error' : 'status';
}

function fmtSize(mb) {
  if (!mb) return '';
  return mb >= 1024 ? `${(mb / 1024).toFixed(1)} GB` : `${mb} MB`;
}

async function fetchVideo(videoId) {
  spinner.style.display = 'block';
  resultCard.style.display = 'none';
  formatsDiv.innerHTML = '';
  showStatus('');

  try {
    const resp = await fetch(`/api/info?v=${videoId}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || 'Failed to fetch video info');
    }
    const data = await resp.json();

    resultThumb.src = data.thumb;
    resultTitle.textContent = data.title;
    resultAuthor.textContent = data.author ? `by ${data.author}` : '';

    data.formats.forEach(f => {
      const isAudio = f.type === 'audio';
      const icon = isAudio ? 'fa-music' : 'fa-video';
      const qualityText = isAudio
        ? (f.abr ? `${f.abr}kbps` : f.quality)
        : (f.height ? `${f.height}p` : f.quality);
      const label = isAudio
        ? `Audio \u00B7 ${qualityText}`
        : `Video \u00B7 ${qualityText}`;
      const size = fmtSize(f.size);

      const row = document.createElement('div');
      row.className = 'format-row';
      row.innerHTML = `
        <span class="label"><i class="fa-solid ${icon}"></i> ${label} ${size ? `(${size})` : ''}</span>
        <a class="dl-btn" href="/api/download?v=${videoId}&f=${f.formatId}" download>Download</a>
      `;
      formatsDiv.appendChild(row);
    });

    if (data.formats.length === 0) {
      showStatus('No downloadable formats found.', true);
    } else {
      resultCard.style.display = 'block';
    }
  } catch (err) {
    showStatus(err.message || 'Something went wrong.', true);
  } finally {
    spinner.style.display = 'none';
  }
}

function handleGo() {
  const url = urlInput.value.trim();
  if (!url) return;
  const videoId = extractVideoId(url);
  if (!videoId) {
    showStatus('Please paste a valid YouTube URL.', true);
    return;
  }
  fetchVideo(videoId);
}

goBtn.addEventListener('click', handleGo);
urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleGo();
});

urlInput.addEventListener('paste', () => {
  setTimeout(handleGo, 100);
});
</script>
</body>
</html>
