<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <script>
    (function() {
      const t = localStorage.getItem('astro-color-theme') || 'mono'
      document.documentElement.setAttribute('data-theme', t)
    })()
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #252525;
      --border: #333; --text: #f0f0f0; --text2: #888; --text3: #555;
      --accent: #ccc; --shadow: rgba(0,0,0,.5);
      --particle: 200,200,200;
    }
    :root[data-theme="space"] {
      --bg: #0d0c18; --bg2: #1c1a2b; --bg3: #2a2740;
      --border: #3a3758; --text: #e0def4; --text2: #a19eb3; --text3: #5c5979;
      --accent: #6b63ff; --shadow: rgba(0,0,0,.4);
      --particle: 107,99,255;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      padding: 32px;
      position: relative;
      overflow-x: hidden;
    }
    canvas#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .content { position:relative; z-index:1; }
    .header { margin-bottom:24px; }
    .header h1 { font-size:24px; font-weight:600; display:flex; align-items:center; gap:10px; }
    .header-icon { color: var(--accent); }
    .header p { color: var(--text2); font-size:14px; margin-top:4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .card {
      background: rgba(26,26,26,0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      backdrop-filter: blur(8px);
    }
    :root[data-theme="space"] .card { background: rgba(28,26,43,0.75); }
    .card:hover {
      background: var(--bg3);
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--shadow);
    }
    .card-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      background: var(--bg3);
      font-size: 26px;
    }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .play-btn {
      margin-top: 12px;
      display: inline-block;
      padding: 6px 18px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="content">
    <div class="header">
      <h1><span class="header-icon">🎮</span> Games</h1>
      <p>Educational interactive simulations</p>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    // ── Particle network ──────────────────────────────────────
    const canvas = document.getElementById('stars')
    const ctx = canvas.getContext('2d')
    let W, H, particles, particleColor = [200,200,200]

    function readParticleColor() {
      const style = getComputedStyle(document.documentElement)
      const raw = style.getPropertyValue('--particle').trim()
      particleColor = raw.split(',').map(Number)
    }

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }
    function makeParticle() {
      return { x: Math.random()*W, y: Math.random()*H, vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4, r:Math.random()*1.5+1 }
    }
    function initParticles() { particles = Array.from({length:80}, makeParticle) }
    function drawFrame() {
      ctx.clearRect(0,0,W,H)
      const [r,g,b] = particleColor
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy
        if (p.x<0||p.x>W) p.vx*=-1
        if (p.y<0||p.y>H) p.vy*=-1
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
        ctx.fillStyle = `rgba(${r},${g},${b},0.7)`; ctx.fill()
      }
      const maxDist = 130
      for (let i=0;i<particles.length;i++) for (let j=i+1;j<particles.length;j++) {
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y
        const dist=Math.sqrt(dx*dx+dy*dy)
        if (dist<maxDist) {
          ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y)
          ctx.strokeStyle=`rgba(${r},${g},${b},${(1-dist/maxDist)*.3})`; ctx.lineWidth=0.8; ctx.stroke()
        }
      }
      requestAnimationFrame(drawFrame)
    }
    window.addEventListener('resize', ()=>{resize();initParticles()})
    resize(); readParticleColor(); initParticles(); drawFrame()

    // ── Theme sync ────────────────────────────────────────────
    window.addEventListener('storage', e => {
      if (e.key === 'astro-color-theme') {
        document.documentElement.setAttribute('data-theme', e.newValue || 'mono')
        readParticleColor()
      }
    })

    // ── Game ─────────────────────────────────────────────────
    const games = [
      {
        title: 'Simulator',
        sub: 'Interactive geometry tool',
        icon: '📐',
        url: '/gn-math.html'
      }
    ]

    document.getElementById('grid').innerHTML = games.map(g => `
      <div class="card" onclick="nav('${g.url}')">
        <div class="card-icon">${g.icon}</div>
        <div class="card-title">${g.title}</div>
        <div class="card-sub">${g.sub}</div>
        <div class="play-btn">▶ Launch</div>
      </div>
    `).join('')

    function nav(url) { window.parent.postMessage({ type:'navigate', url }, '*') }
  </script>
</body>
</html>
