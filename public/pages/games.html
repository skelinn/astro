<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #232136;
      color: #e0def4;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      padding: 32px;
    }
    .header {
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      color: #6b63ff;
    }
    .header p {
      color: #a19eb3;
      font-size: 14px;
      margin-top: 4px;
    }
    .search-box {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      background: #1c1a2b;
      border: 1px solid #3a3758;
      border-radius: 10px;
      color: #e0def4;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      margin-bottom: 24px;
    }
    .search-box::placeholder { color: #5c5979; }
    .search-box:focus { border-color: #6b63ff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .card {
      background: #1c1a2b;
      border: 1px solid #3a3758;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .card:hover {
      background: #2a2740;
      border-color: #5c59a5;
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 32px;
      margin-bottom: 10px;
      color: #6b63ff;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
    }
    .empty {
      color: #5c5979;
      font-size: 14px;
      text-align: center;
      padding: 48px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="header-icon">&#127918;</span> Games</h1>
    <p>Play games through the proxy</p>
  </div>
  <input type="text" class="search-box" placeholder="Search games..." id="search" oninput="filterGames()" />
  <div class="grid" id="grid"></div>

  <script>
    // Games data — add entries here
    const games = [
      { title: 'Balls', url: 'https://games.washingtonpost.com/games/price-is-right-plinko', icon: '🟣' },
      { title: 'Slope', url: 'https://slope-game.github.io/', icon: '⛷' },
      { title: '1v1.LOL', url: 'https://1v1.lol', icon: '🔫' },
      { title: 'Retro Bowl', url: 'https://retro-bowl-game.github.io/', icon: '🏈' },
      { title: 'Cookie Clicker', url: 'https://orteil.dashnet.org/cookieclicker/', icon: '🍪' },
      { title: 'Subway Surfers', url: 'https://subwaysurfers.me/', icon: '🏃' },
      { title: 'Tetris', url: 'https://tetris.com/play-tetris', icon: '🟦' },
      { title: '2048', url: 'https://play2048.co/', icon: '🔢' },
      { title: 'Minecraft Classic', url: 'https://classic.minecraft.net/', icon: '⛏' },
      { title: 'Paper.io 2', url: 'https://paper-io.com/', icon: '📄' },
      { title: 'Moto X3M', url: 'https://motox3m.io/', icon: '🏍' },
      { title: 'Run 3', url: 'https://run3.io/', icon: '🏃‍♂️' },
      { title: 'Smash Karts', url: 'https://smashkarts.io/', icon: '🏎' },
    ]

    function renderGames(list) {
      const grid = document.getElementById('grid')
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty">No games found</div>'
        return
      }
      grid.innerHTML = list.map(g => `
        <div class="card" onclick="nav('${g.url}')">
          <div class="card-icon">${g.icon}</div>
          <div class="card-title">${g.title}</div>
        </div>
      `).join('')
    }

    function filterGames() {
      const q = document.getElementById('search').value.toLowerCase()
      renderGames(games.filter(g => g.title.toLowerCase().includes(q)))
    }

    function nav(url) {
      window.parent.postMessage({ type: 'navigate', url: url }, '*')
    }

    renderGames(games)
  </script>
</body>
</html>
