<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>astro - browse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .landing {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .landing.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .page-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.15rem; }
    .page-sub { font-size: 1rem; color: #888; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    .page-tagline { color: #a3a3a3; font-size: 1.1rem; margin-bottom: 2.5rem; text-align: center; }

    .search-form {
      width: 100%;
      max-width: 560px;
      position: relative;
      padding: 0 1rem;
    }
    .search-form input {
      width: 100%;
      height: 56px;
      background: rgba(255,255,255,0.06);
      border: 2px solid #333;
      border-radius: 9999px;
      color: #fff;
      font-size: 1rem;
      padding: 0 130px 0 24px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-form input:focus { border-color: #fff; }
    .search-form input::placeholder { color: #555; }
    .search-form button {
      position: absolute;
      top: 4px; right: calc(1rem + 4px);
      height: 48px;
      padding: 0 1.5rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.2s;
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }
    .search-form button:hover { opacity: 0.85; }

    .status { margin-top: 1.5rem; text-align: center; color: #888; font-size: 0.95rem; }
    .status.error { color: #ff4444; }

    .browser-view {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      flex-direction: column;
      background: #000;
    }
    .browser-view.active { display: flex; }

    .browser-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      background: #111;
      border-bottom: 1px solid #222;
      z-index: 30;
    }
    .browser-bar button {
      background: none;
      border: none;
      color: #888;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.4rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .browser-bar button:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .browser-bar input {
      flex: 1;
      height: 34px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.85rem;
      padding: 0 12px;
      outline: none;
    }
    .browser-bar input:focus { border-color: #fff; }

    #proxyFrame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    .credit {
      position: fixed;
      bottom: 1rem; left: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #fff;
      opacity: 0.4;
      z-index: 5;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>

  <div class="landing" id="landing">
    <div class="page-title">アストロ</div>
    <div class="page-sub">browse</div>
    <p class="page-tagline">search the web freely.</p>

    <form class="search-form" id="searchForm">
      <input id="urlInput" type="text" placeholder="Search or enter a URL..." autocomplete="off" autofocus>
      <button type="submit"><i class="fa-solid fa-arrow-right"></i> Go</button>
    </form>
    <div class="status" id="status"></div>
  </div>

  <div class="browser-view" id="browserView">
    <div class="browser-bar">
      <button id="btnBack" title="Back"><i class="fa-solid fa-arrow-left"></i></button>
      <button id="btnForward" title="Forward"><i class="fa-solid fa-arrow-right"></i></button>
      <button id="btnReload" title="Reload"><i class="fa-solid fa-rotate-right"></i></button>
      <input id="barUrl" type="text" placeholder="Search or enter a URL..." autocomplete="off">
      <button id="btnHome" title="Home"><i class="fa-solid fa-house"></i></button>
    </div>
    <iframe id="proxyFrame" allowfullscreen></iframe>
  </div>

  <div class="credit">made by skelin</div>

  <!-- Particles -->
  <script>
  (function() {
    const c = document.getElementById('stars'), ctx = c.getContext('2d');
    let w = c.width = innerWidth, h = c.height = innerHeight;
    const dots = Array.from({length: 200}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      r: Math.random()*1.2+0.3,
      vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15,
      o: Math.random()*0.8+0.2
    }));
    (function draw() {
      ctx.clearRect(0,0,w,h);
      dots.forEach(s => {
        s.x+=s.vx; s.y+=s.vy;
        if(s.x<0||s.x>w)s.vx*=-1;
        if(s.y<0||s.y>h)s.vy*=-1;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.o+Math.sin(Date.now()/1000+s.x)*0.1})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    })();
    addEventListener('resize',()=>{w=c.width=innerWidth;h=c.height=innerHeight;});
  })();
  </script>

  <!-- Proxy Logic -->
  <script>
  const landing     = document.getElementById('landing');
  const browserView = document.getElementById('browserView');
  const searchForm  = document.getElementById('searchForm');
  const urlInput    = document.getElementById('urlInput');
  const statusEl    = document.getElementById('status');
  const barUrl      = document.getElementById('barUrl');
  const frame       = document.getElementById('proxyFrame');

  let currentQuery = '';

  function isUrl(val) {
    return /^https?:\/\//i.test(val) || /^[a-z0-9]([a-z0-9-]*\.)+[a-z]{2,}/i.test(val);
  }

  function navigate(raw) {
    if (!raw) return;

    let url = raw.trim();
    if (!isUrl(url)) {
      currentQuery = url;
      url = 'https://html.duckduckgo.com/html/?q=' + encodeURIComponent(url);
    } else {
      currentQuery = '';
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
      }
    }

    barUrl.value = currentQuery || url;
    frame.src = '/p?url=' + encodeURIComponent(url);

    landing.classList.add('hidden');
    browserView.classList.add('active');
    statusEl.textContent = '';
  }

  searchForm.addEventListener('submit', (e) => {
    e.preventDefault();
    navigate(urlInput.value);
  });

  barUrl.addEventListener('focus', () => {
    barUrl.select();
  });

  barUrl.addEventListener('click', () => {
    barUrl.select();
  });

  barUrl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      navigate(barUrl.value);
    }
  });

  document.getElementById('btnBack').addEventListener('click', () => {
    try { frame.contentWindow.history.back(); } catch {}
  });
  document.getElementById('btnForward').addEventListener('click', () => {
    try { frame.contentWindow.history.forward(); } catch {}
  });
  document.getElementById('btnReload').addEventListener('click', () => {
    if (frame.src) {
      const old = frame.src;
      frame.src = '';
      setTimeout(() => { frame.src = old; }, 50);
    }
  });
  document.getElementById('btnHome').addEventListener('click', () => {
    frame.src = '';
    currentQuery = '';
    landing.classList.remove('hidden');
    browserView.classList.remove('active');
  });
  </script>
</body>
</html>
