<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #232136;
      color: #e0def4;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .clock {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .clock-period {
      font-size: 24px;
      font-weight: 400;
      color: #a19eb3;
      margin-left: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #a19eb3;
      margin-bottom: 48px;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 480px;
      width: 90%;
    }
    .quick-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: #1c1a2b;
      border: 1px solid #3a3758;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-decoration: none;
      color: #e0def4;
    }
    .quick-link:hover {
      background: #2a2740;
      border-color: #5c59a5;
      transform: translateY(-2px);
    }
    .ql-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .ql-title {
      font-size: 13px;
      font-weight: 500;
    }
    .ql-youtube .ql-icon { background: rgba(255,0,0,0.15); color: #ff4444; }
    .ql-discord .ql-icon { background: rgba(88,101,242,0.15); color: #5865f2; }
    .ql-github .ql-icon { background: rgba(255,255,255,0.1); color: #e0def4; }
    .ql-google .ql-icon { background: rgba(66,133,244,0.15); color: #4285f4; }
    .ql-wikipedia .ql-icon { background: rgba(255,255,255,0.1); color: #e0def4; }
    .ql-reddit .ql-icon { background: rgba(255,69,0,0.15); color: #ff4500; }
    .footer {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 11px;
      color: #5c5979;
    }
    .footer a { color: #6b63ff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .ping-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #44cc44;
      margin-right: 6px;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .clock { font-size: 48px; }
      .quick-links { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="clock" id="clock"></div>
  <div class="subtitle">What will you explore today?</div>

  <div class="quick-links">
    <div class="quick-link ql-youtube" onclick="nav('https://www.youtube.com')">
      <div class="ql-icon">&#9654;</div>
      <div class="ql-title">YouTube</div>
    </div>
    <div class="quick-link ql-discord" onclick="nav('https://discord.com/app')">
      <div class="ql-icon">&#9741;</div>
      <div class="ql-title">Discord</div>
    </div>
    <div class="quick-link ql-github" onclick="nav('https://github.com')">
      <div class="ql-icon">&#10070;</div>
      <div class="ql-title">GitHub</div>
    </div>
    <div class="quick-link ql-google" onclick="nav('https://www.google.com')">
      <div class="ql-icon">G</div>
      <div class="ql-title">Google</div>
    </div>
    <div class="quick-link ql-wikipedia" onclick="nav('https://en.wikipedia.org')">
      <div class="ql-icon">W</div>
      <div class="ql-title">Wikipedia</div>
    </div>
    <div class="quick-link ql-reddit" onclick="nav('https://www.reddit.com')">
      <div class="ql-icon">&#9673;</div>
      <div class="ql-title">Reddit</div>
    </div>
  </div>

  <div class="footer">
    <div><span class="ping-dot"></span>Connected</div>
    <div>v1.0.0 · <a href="https://github.com" target="_blank">GitHub</a></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date()
      let h = now.getHours()
      const m = String(now.getMinutes()).padStart(2, '0')
      const s = String(now.getSeconds()).padStart(2, '0')
      const period = h >= 12 ? 'PM' : 'AM'
      h = h % 12 || 12
      document.getElementById('clock').innerHTML =
        `${h}:${m}:${s}<span class="clock-period">${period}</span>`
    }
    updateClock()
    setInterval(updateClock, 1000)

    function nav(url) {
      window.parent.postMessage({ type: 'navigate', url: url }, '*')
    }
  </script>
</body>
</html>
